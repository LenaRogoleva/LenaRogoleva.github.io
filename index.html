<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --select-popup-background: white;
        }
        
        body {
            margin: 0;
            padding: 2rem;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 4rem;
            font-family: 'Open Sans', sans-serif;
        }
    </style>
</head>
<script>
    const createElement = (componentName) => {
        const element = document.createElement(componentName);

        if (componentName === 'my-panel') {
            element.innerHTML = `
                <div slot="header">
                    Кастомная панель
                </div>
                <div slot="content">
                    <p>Это контент панели</p>
                    <my-select>
                         <div slot="search">
                            <input class="select-popup-search"
                                   placeholder="Поиск..." />
                         </div>
                         <option value="opt1">Option 1</option>
                         <option value="opt2">Option 2</option>
                         <option value="opt3">Option 3</option>
                    </my-select>
                </div>
            `;
        } else {
            element.innerHTML = `
            <style>
                .select-popup-search {
                  width: calc(100% - 2.5rem);
                  padding: 0.5rem 0.75rem;
                  margin: 0.5rem;
                  border: 1px solid var(--border-color);
                  border-radius: 0.25rem;
                  font-family: inherit;
                  font-size: 0.875rem;

                  &:focus,
                   &:hover {
                    border-color: var(--hover-border-color);
                    outline: none;
                  }
                }
            </style>
            <div slot="search">
                <input class="select-popup-search"
                       placeholder="Поиск..." />
            </div>
            <option value="opt1">Option 1</option>
            <option value="opt2">Option 2</option>
            <option value="opt3">Option 3</option>
        `;
        }
        
        return element;
    }

    const components = ['my-select', 'my-panel'];

    const loadPromises = components.map(component => {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `./${component}.js`;
            script.dataset.name = component;
            script.addEventListener('load', () => resolve(component));
            script.addEventListener('error', reject);
            document.head.append(script);
        });
    });

    Promise.all(loadPromises).then(() => {
        components.forEach(component => {
            document.body.append(createElement(component));
        });
    });
</script>
<body>

</body>
</html>
